<!DOCTYPE html>
<html>
<head>
  <title>Pervellam</title>
  <style>
    table {
      border-collapse: collapse;
      width: 100%;
    }

    th, td {
      border: 1px solid #ddd;
      padding: 8px;
      text-align: left;
    }

    th {
      background-color: #f2f2f2;
    }
  </style>
  <script>
    // Drop sub-second precision from an ISO timestamp for display (#23 follow-up).
    function truncateToSecond(value) {
      return value ? String(value).replace(/\.\d+/, '') : value;
    }
    // Generate HTML table from JSON response
    function generateTable(jsonResponse) {
      var tableContainer = document.getElementById('tableContainer');
//clear existing table
while (tableContainer.firstChild) {
  tableContainer.removeChild(tableContainer.firstChild);
}
      var table = document.createElement('table');
      var thead = document.createElement('thead');
      var tbody = document.createElement('tbody');
      var headerRow = document.createElement('tr');

      // Create table header
      for (var key in jsonResponse[0]) {
	if (key == 'fname' || key == 'id') {
		continue
	}
        var th = document.createElement('th');
        th.textContent = key;
        headerRow.appendChild(th);
      }
      var thx = document.createElement('th');
      thx.textContent = 'stop';
      headerRow.appendChild(thx)
      thead.appendChild(headerRow);
      table.appendChild(thead);

      // Create table rows
      jsonResponse.forEach(function (obj) {
        var row = document.createElement('tr');
        for (var prop in obj) {
	  if (prop == 'fname' || prop == 'id') {
		  continue
	  }
          var td = document.createElement('td');
	  if (prop == 'url') {
		  var urla = document.createElement('a');
		  urla.href = obj['url']
		  urla.textContent = obj['url'].substring(obj['url'].lastIndexOf('/') + 1);
		  td.appendChild(urla);
          } else if (prop == 'started' || prop == 'updated') {
          	td.textContent = truncateToSecond(obj[prop]);
          } else {
          	td.textContent = obj[prop];
	  }
          row.appendChild(td);
        }
	var tdx = document.createElement('td');
	var formx = document.createElement('form');
	var subx = document.createElement('input');
	var stuck = obj['status'] == 'stopreq';
        formx.onsubmit = function (event) {
	      event.preventDefault();
	      if (stuck) {
		      forceStopJob(obj['id']);
	      } else {
		      stopJob(obj['id']);
	      }
	      console.log("Form submitted");
        }
	subx.type = 'submit';
	subx.value = stuck ? 'Force' : 'Stop';
	formx.appendChild(subx);
	tdx.appendChild(formx);
	// Pause = stop the current job and re-queue the same URL at the bottom (#24).
	if (!stuck) {
		var formp = document.createElement('form');
		var subp = document.createElement('input');
		formp.onsubmit = function (event) {
			event.preventDefault();
			pauseJob(obj['id'], obj['url']);
		}
		subp.type = 'submit';
		subp.value = 'Pause';
		formp.appendChild(subp);
		tdx.appendChild(formp);
	}
	row.appendChild(tdx);
        tbody.appendChild(row);
      });

      table.appendChild(tbody);
      tableContainer.appendChild(table);
    }
    // Submit a new job for the given URL. Returns the fetch promise.
    function createJob(url) {
      return fetch('/jobs/', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({ url: url })
      });
    }
    function postData(event) {
      event.preventDefault();

      // Get form data
      var url = document.getElementById('url').value;

      // Make POST request to API
      createJob(url)
      .then(function(response) {
        if (response.ok) {
          console.log('Data posted successfully!');
          // Handle success response here
	  getApiData()
        } else {
          console.log('Error:', response.status);
          // Handle error response here
        }
      })
      .catch(function(error) {
        console.log('Error:', error);
        // Handle network error here
      });
    }
    // Build the bookmarklet href, embedding this server's real origin so it
    // works from any cross-origin page the user is browsing. The target URL is
    // passed in the fragment so it never reaches the server (e.g. access logs).
    function setupBookmarklet() {
      var base = window.location.origin + window.location.pathname;
      var code = "javascript:(function(){window.open('" + base +
                 "#addurl='+encodeURIComponent(location.href));})();";
      document.getElementById('bookmarklet').href = code;
    }
    // When opened with #addurl=..., auto-submit that URL as a new job.
    function checkAutoSubmit() {
      var addurl = new URLSearchParams(window.location.hash.slice(1)).get('addurl');
      if (!addurl) {
        return;
      }
      // Strip the fragment so a reload doesn't re-submit.
      history.replaceState({}, '', window.location.pathname);
      createJob(addurl)
      .then(function(response) {
        if (response.ok) {
          console.log('Bookmarklet job created!');
          getApiData()
        } else {
          console.log('Error:', response.status);
        }
      })
      .catch(function(error) {
        console.log('Error:', error);
      });
    }
    function getApiData() {
// Make GET request to API
fetch('/jobs/?filt=active', {
  method: 'GET',
  headers: {
    'Content-Type': 'application/json'
  }
})
.then(function(response) {
  if (response.ok) {
    return response.json();
  } else {
    throw new Error('Error: ' + response.status);
  }
})
.then(function(data) {
  // Handle the retrieved data
  console.log(data);
  // Process the data or update the UI here
  generateTable(data)
  getFinishedData()
})
.catch(function(error) {
  console.log('Error:', error.message);
  // Handle network or API error here
});
}
   function stopJob(job_id) {

      // Make POST request to API
      fetch('/jobs/' + job_id + '/stop', {
        method: 'POST'
      })
      .then(function(response) {
        if (response.ok) {
          console.log('Data posted successfully!');
          // Handle success response here
	  getApiData()
        } else {
          console.log('Error:', response.status);
          // Handle error response here
        }
      })
      .catch(function(error) {
        console.log('Error:', error);
        // Handle network error here
      });
    }
   function forceStopJob(job_id) {

      // Force-clear a stuck (stopreq) job to 'stopped'
      fetch('/jobs/' + job_id + '/stop', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({ force: true })
      })
      .then(function(response) {
        if (response.ok) {
          console.log('Data posted successfully!');
          // Handle success response here
	  getApiData()
        } else {
          console.log('Error:', response.status);
          // Handle error response here
        }
      })
      .catch(function(error) {
        console.log('Error:', error);
        // Handle network error here
      });
    }
   // Pause a job: stop it, then re-queue the same URL as a fresh job (#24).
   function pauseJob(job_id, url) {
      fetch('/jobs/' + job_id + '/stop', { method: 'POST' })
      .then(function() { return createJob(url); })
      .then(function() { getApiData(); })
      .catch(function(error) { console.log('Error:', error); });
    }
    // Resolve a finished job's OI file URL to its real (presigned) download and go there (#23).
    function openInOi(fileUrl) {
      fetch(fileUrl, { headers: { 'Accept': 'application/json' } })
      .then(function (r) { return r.json(); })
      .then(function (file) {
        var objId = file.file_object.uuid;
        // fname is "<base>file/<uuid>"; build "<base>object/<objId>/download".
        var base = fileUrl.replace(/file\/[^/]+\/?$/, '');
        return fetch(base + 'object/' + objId + '/download');
      })
      .then(function (r) { return r.json(); })
      .then(function (dl) { window.location = dl.presigned; })
      .catch(function (error) { console.log('Error:', error); });
    }
    // Build the "Recently finished" table, linking finished jobs to ObjectIndex (#23).
    function generateFinishedTable(jsonResponse) {
      var container = document.getElementById('finishedContainer');
      while (container.firstChild) {
        container.removeChild(container.firstChild);
      }
      if (!jsonResponse.length) {
        return;
      }
      var heading = document.createElement('h3');
      heading.textContent = 'Recently finished';
      container.appendChild(heading);
      var table = document.createElement('table');
      var thead = document.createElement('thead');
      var headerRow = document.createElement('tr');
      ['url', 'status', 'OI'].forEach(function (label) {
        var th = document.createElement('th');
        th.textContent = label;
        headerRow.appendChild(th);
      });
      thead.appendChild(headerRow);
      table.appendChild(thead);
      var tbody = document.createElement('tbody');
      jsonResponse.forEach(function (obj) {
        var row = document.createElement('tr');
        var tdu = document.createElement('td');
        var urla = document.createElement('a');
        urla.href = obj['url'];
        urla.textContent = obj['url'].substring(obj['url'].lastIndexOf('/') + 1);
        tdu.appendChild(urla);
        row.appendChild(tdu);
        var tds = document.createElement('td');
        tds.textContent = obj['status'];
        row.appendChild(tds);
        var tdo = document.createElement('td');
        if (obj['fname']) {
          var oia = document.createElement('a');
          oia.href = '#';
          oia.textContent = 'Open in OI';
          var fname = obj['fname'];
          oia.onclick = function (event) { event.preventDefault(); openInOi(fname); };
          tdo.appendChild(oia);
        }
        row.appendChild(tdo);
        tbody.appendChild(row);
      });
      table.appendChild(tbody);
      container.appendChild(table);
    }
    function getFinishedData() {
      fetch('/jobs/?filt=finished', {
        method: 'GET',
        headers: { 'Content-Type': 'application/json' }
      })
      .then(function(response) {
        if (response.ok) {
          return response.json();
        }
        throw new Error('Error: ' + response.status);
      })
      .then(function(data) {
        generateFinishedTable(data);
      })
      .catch(function(error) {
        console.log('Error:', error.message);
      });
    }
  </script>
</head>
<body onload="getApiData();setupBookmarklet();checkAutoSubmit()">
  <div id="tableContainer"></div>
  <div>
  <form id="postForm" onsubmit="postData(event)">
    <label for="url">URL:</label>
    <input type="text" id="url" name="url" required><br><br>
    <input type="submit" value="Submit">
  </form>
  </div>
  <div id="finishedContainer"></div>
  <div>
    <p>Drag this to your bookmarks bar to queue the page you're viewing:
       <a id="bookmarklet" href="#">Pervellam</a></p>
  </div>
</body>
</html>
